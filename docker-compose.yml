services:
  fintracker:
    build: .
    container_name: fintracker
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - DATABASE_PATH=/data/finance.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AUTH_SECRET=${AUTH_SECRET}
      - DATABASE_URL=${DATABASE_URL:-/data/finance.db}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - MASTER_USERNAME=${MASTER_USERNAME:-admin}
      - MASTER_PASSWORD=${MASTER_PASSWORD}
      - LOG_DIR=/logs
    volumes:
      - fintracker_data:/data
      - fintracker_logs:/logs
      - fintracker_backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  fintracker_data:
  fintracker_logs:
  fintracker_backups:
